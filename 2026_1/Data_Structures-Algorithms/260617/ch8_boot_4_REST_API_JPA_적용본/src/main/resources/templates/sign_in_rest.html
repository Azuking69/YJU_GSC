<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>REST SIGN IN</title>
</head>
<body>
<h1>REST 방식 로그인</h1>

<!--
    기존 sign_in.html은 form submit 후 signInConfirm 컨트롤러로 이동한다.
    이 화면은 이동하지 않고 fetch()로 로그인 REST API를 호출한다.
-->
<form id="signInForm">
    <p>
        <label>아이디</label>
        <input type="text" id="m_id" name="m_id" placeholder="아이디">
    </p>
    <p>
        <label>비밀번호</label>
        <input type="password" id="m_pw" name="m_pw" placeholder="비밀번호">
    </p>
    <p>
        <button type="submit">REST SIGN IN</button>
        <button type="reset">CANCEL</button>
    </p>
</form>

<!-- REST API 응답 결과를 화면에 보여줄 영역 -->
<p id="resultMessage"></p>

<p>
    <a href="/">홈으로</a>
    |
    <a href="/signIn">기존 MVC 로그인</a>
    |
    <a href="/rest/signUp">REST 회원가입</a>
</p>

<script>
    const signInForm = document.getElementById('signInForm');

    signInForm.addEventListener('submit', async function (event) {
        /*
         * form 기본 submit 동작을 막는다.
         * 화면 전체가 signInConfirm으로 이동하지 않게 하기 위함이다.
         */
        event.preventDefault();

        /*
         * 로그인에는 아이디와 비밀번호만 필요하다.
         * 그래도 MemberVo를 그대로 재사용하기 때문에 key 이름은 m_id, m_pw로 맞춘다.
         */
        const memberVo = {
            m_id: document.getElementById('m_id').value,
            m_pw: document.getElementById('m_pw').value
        };

        const response = await fetch('/api/members/sign-in', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(memberVo)
        });

        const result = await response.json();

        if (result.success) {
            document.getElementById('resultMessage').innerText = result.memberId + ' 님, 로그인에 성공했습니다.';
        } else {
            document.getElementById('resultMessage').innerText = result.message;
        }
    });
</script>
</body>
</html>
