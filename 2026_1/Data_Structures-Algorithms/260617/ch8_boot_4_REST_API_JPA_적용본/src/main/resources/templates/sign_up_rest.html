<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>REST SIGN UP</title>
</head>
<body>
<h1>REST 방식 회원가입</h1>

<!--
    기존 sign_up.html과 가장 큰 차이점

    기존 방식:
    - form action="/signUpConfirm"
    - submit 버튼을 누르면 브라우저가 서버로 이동한다.
    - 서버는 sign_up_ok.html 또는 sign_up_ng.html을 반환한다.

    REST 방식:
    - form submit 기본 이동을 막는다.
    - JavaScript fetch()로 JSON 데이터를 보낸다.
    - 서버는 HTML이 아니라 JSON 결과를 반환한다.
-->
<form id="signUpForm">
    <p>
        <label>아이디</label>
        <input type="text" id="m_id" name="m_id">
    </p>
    <p>
        <label>비밀번호</label>
        <input type="password" id="m_pw" name="m_pw">
    </p>
    <p>
        <label>메일 주소</label>
        <input type="email" id="m_mail" name="m_mail">
    </p>
    <p>
        <label>연락처</label>
        <input type="text" id="m_phone" name="m_phone">
    </p>
    <p>
        <button type="submit">REST SIGN UP</button>
        <button type="reset">CANCEL</button>
    </p>
</form>

<!-- REST API 응답 결과를 화면에 보여줄 영역 -->
<p id="resultMessage"></p>

<p>
    <a href="/">홈으로</a>
    |
    <a href="/signUp">기존 MVC 회원가입</a>
    |
    <a href="/rest/signIn">REST 로그인</a>
</p>

<script>
    /*
     * form 태그를 가져온다.
     * 아래 addEventListener는 "회원가입 폼이 submit 되었을 때" 실행된다.
     */
    const signUpForm = document.getElementById('signUpForm');

    signUpForm.addEventListener('submit', async function (event) {
        /*
         * event.preventDefault()
         * - form의 기본 submit 동작을 막는다.
         * - 기본 submit 동작이 실행되면 브라우저가 action 주소로 이동한다.
         * - REST 방식에서는 화면 이동이 아니라 fetch()로 JSON 통신을 해야 하므로 막아준다.
         */
        event.preventDefault();

        /*
         * 서버로 보낼 JavaScript 객체를 만든다.
         * key 이름은 MemberVo의 필드명과 같게 맞춘다.
         * 그래야 스프링이 JSON을 MemberVo로 쉽게 바인딩할 수 있다.
         */
        const memberVo = {
            m_id: document.getElementById('m_id').value,
            m_pw: document.getElementById('m_pw').value,
            m_mail: document.getElementById('m_mail').value,
            m_phone: document.getElementById('m_phone').value
        };

        /*
         * fetch()
         * - 브라우저에서 서버로 HTTP 요청을 보내는 JavaScript 함수
         * - 여기서는 POST 방식으로 REST API에 JSON 데이터를 보낸다.
         */
        const response = await fetch('/api/members/sign-up', {
            method: 'POST',
            headers: {
                /*
                 * Content-Type: application/json
                 * - 서버에게 "내가 보내는 데이터는 JSON입니다"라고 알려준다.
                 */
                'Content-Type': 'application/json'
            },
            /*
             * JSON.stringify()
             * - JavaScript 객체를 JSON 문자열로 바꾼다.
             * - HTTP 요청 body에는 문자열 형태로 담아 보내야 한다.
             */
            body: JSON.stringify(memberVo)
        });

        /*
         * 서버가 보낸 JSON 응답을 JavaScript 객체로 변환한다.
         */
        const result = await response.json();

        /*
         * result 예시:
         * {
         *   success: true,
         *   message: '회원가입에 성공했습니다.',
         *   memberId: 'hong'
         * }
         */
        document.getElementById('resultMessage').innerText = result.message;
    });
</script>
</body>
</html>
